name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '18'

jobs:
  # ============================================================================
  # VERIFY AND BUILD
  # ============================================================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: |
        npm run test:unit -- --run
        npm run test:integration -- --run
      
    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production
        VITE_APP_VERSION: ${{ github.ref_name }}
        VITE_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        VITE_BUILD_COMMIT: ${{ github.sha }}
        
    - name: Verify build
      run: |
        test -f dist/index.html
        test -f dist/manifest.json
        test -f dist/sw.js || echo "Warning: Service worker not found"
        ls -la dist/
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-build
        path: dist/
        retention-days: 1

  # ============================================================================
  # DEPLOY TO CLOUDFLARE PAGES
  # ============================================================================
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: cloudflare-build
        path: dist/
        
    - name: Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: protocolo-cdmx
        directory: dist
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Comment deployment URL
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🚀 **Preview deployed to Cloudflare Pages!**\n\nYour changes are live at: ${{ steps.deploy.outputs.url }}'
          })

  # ============================================================================
  # CREATE RELEASE (only for tags)
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: cloudflare-build
        path: dist/
        
    - name: Create release archive
      run: |
        cd dist
        zip -r ../protocolo-cdmx-${{ github.ref_name }}.zip .
        cd ..
        
    - name: Generate changelog
      id: changelog
      run: |
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        git log --pretty=format:"- %s" --no-merges $(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")..HEAD >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: protocolo-cdmx-${{ github.ref_name }}.zip
        body: |
          ## Release ${{ github.ref_name }}
          
          ### Changes
          ${{ steps.changelog.outputs.changelog }}
          
          ### Deployment
          - 🌐 **Live App**: https://protocolo-cdmx.pages.dev
          - 📦 **Download**: protocolo-cdmx-${{ github.ref_name }}.zip
          
          ### Install as PWA
          1. Visit https://protocolo-cdmx.pages.dev on your mobile device
          2. Tap "Add to Home Screen" when prompted
          3. The app will be available offline
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
