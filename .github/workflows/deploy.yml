name: Deploy

on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '18'

jobs:
  # ============================================================================
  # VERIFY RELEASE
  # ============================================================================
  verify-release:
    name: Verify Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Verify tag matches version
      run: |
        PACKAGE_VERSION=$(cat package.json | jq -r '.version')
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
          echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
          exit 1
        fi
        echo "✓ Version verified: $PACKAGE_VERSION"

  # ============================================================================
  # BUILD PRODUCTION
  # ============================================================================
  build-production:
    name: Build Production
    runs-on: ubuntu-latest
    needs: verify-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run all tests
      run: |
        npm run test:unit
        npm run test:integration
        npm run test:a11y
      
    - name: Build for production
      run: npm run build
      env:
        NODE_ENV: production
        VITE_APP_VERSION: ${{ github.ref_name }}
        VITE_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        VITE_BUILD_COMMIT: ${{ github.sha }}
        VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        
    - name: Optimize assets
      run: |
        # Optimize images
        find dist -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" | xargs -I {} npx imagemin {} --out-dir=dist --plugin=pngquant --plugin=mozjpeg
        
        # Minify JSON
        find dist -name "*.json" -exec npx json-minify {} \;
        
        # Gzip assets
        find dist -type f \( -name "*.js" -o -name "*.css" -o -name "*.html" \) -exec gzip -k {} \;
        
    - name: Generate service worker
      run: npm run generate-sw
      
    - name: Verify PWA requirements
      run: |
        test -f dist/manifest.json
        test -f dist/sw.js
        test -f dist/icons/icon-192x192.png
        test -f dist/icons/icon-512x512.png
        echo "✓ PWA requirements verified"
        
    - name: Calculate build checksums
      run: |
        find dist -type f -exec sha256sum {} \; > dist/checksums.txt
        
    - name: Create build info
      run: |
        cat > dist/build-info.json <<EOF
        {
          "version": "${{ github.ref_name }}",
          "commit": "${{ github.sha }}",
          "date": "${{ github.event.head_commit.timestamp }}",
          "branch": "${{ github.ref }}",
          "buildNumber": "${{ github.run_number }}",
          "builtBy": "GitHub Actions"
        }
        EOF
        
    - name: Upload production build
      uses: actions/upload-artifact@v4
      with:
        name: production-build
        path: dist/
        retention-days: 30

  # ============================================================================
  # SECURITY SCAN
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-production
    
    steps:
    - name: Download build
      uses: actions/download-artifact@v4
      with:
        name: production-build
        path: dist/
        
    - name: Run security scan
      run: |
        # Check for common security issues in build
        if grep -r "eval(" dist/; then
          echo "Error: Found eval() in build"
          exit 1
        fi
        
        if grep -r "innerHTML" dist/ | grep -v " sanitized"; then
          echo "Warning: Found innerHTML usage"
        fi
        
        echo "✓ Security scan passed"

  # ============================================================================
  # DEPLOY TO GITHUB PAGES
  # ============================================================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-production, security-scan]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download production build
      uses: actions/download-artifact@v4
      with:
        name: production-build
        path: dist/
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        cname: ${{ secrets.CUSTOM_DOMAIN }}
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Deploy ${{ github.ref_name }} - ${{ github.sha }}'
        
    - name: Verify deployment
      run: |
        sleep 30
        curl -f https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ || exit 1
        echo "✓ Deployment verified"

  # ============================================================================
  # CREATE RELEASE
  # ============================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Download production build
      uses: actions/download-artifact@v4
      with:
        name: production-build
        path: dist/
        
    - name: Generate changelog
      run: |
        # Get previous tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
        
        if [ -z "$PREVIOUS_TAG" ]; then
          # First release
          CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
        else
          CHANGELOG=$(git log --pretty=format:"- %s" --no-merges ${PREVIOUS_TAG}..HEAD)
        fi
        
        echo "CHANGELOG<<EOF" >> $GITHUB_ENV
        echo "$CHANGELOG" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
        
    - name: Create release notes
      run: |
        cat > release-notes.md <<EOF
        ## Release ${{ github.ref_name }}
        
        ### What's New
        ${{ env.CHANGELOG }}
        
        ### Deployment Info
        - **Version**: ${{ github.ref_name }}
        - **Commit**: ${{ github.sha }}
        - **Build Date**: ${{ github.event.head_commit.timestamp }}
        - **Build Number**: ${{ github.run_number }}
        
        ### Links
        - 🌐 **Live App**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        - 📱 **Install PWA**: Visit the live app on your mobile device
        - 📖 **Documentation**: https://github.com/${{ github.repository }}/blob/main/docs/README.md
        
        ### Security
        - All dependencies audited
        - Security scan passed
        - Checksums: \`dist/checksums.txt\`
        
        ### Support
        For issues or questions, please visit: https://github.com/${{ github.repository }}/issues
        EOF
        
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body_path: release-notes.md
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        
    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/
        asset_name: protocolo-cdmx-${{ github.ref_name }}.zip
        asset_content_type: application/zip

  # ============================================================================
  # NOTIFY COMMUNITY
  # ============================================================================
  notify:
    name: Notify Community
    runs-on: ubuntu-latest
    needs: create-release
    if: success()
    
    steps:
    - name: Send notification to Discord
      uses: sarisia/actions-status-discord@v1
      if: always()
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
        title: "Protocolo CDMX ${{ github.ref_name }} Released! 🚀"
        description: |
          New version deployed successfully!
          
          🔗 Live: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          📦 Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          
          Install as PWA on your device for offline access.
        color: 0x00ff00
        
    - name: Update documentation
      run: |
        echo "Release ${{ github.ref_name }} deployed successfully"
        echo "Documentation should be updated manually if needed"
